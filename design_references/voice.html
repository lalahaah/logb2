<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AI Voice Meeting Recorder</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#135bec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased min-h-screen flex justify-center">
<div class="relative flex h-[100dvh] w-full max-w-md flex-col overflow-hidden bg-background-light dark:bg-background-dark shadow-2xl">
<header class="flex items-center justify-between px-4 py-4 pt-8">
<button class="flex h-10 w-10 items-center justify-center rounded-full text-slate-500 hover:bg-slate-200 dark:text-slate-400 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-2xl">close</span>
</button>
<div class="flex flex-col items-center">
<span class="text-xs font-medium uppercase tracking-wider text-slate-500 dark:text-slate-400">Meeting Recorder</span>
<h1 class="text-lg font-bold leading-tight">Client XYZ</h1>
</div>
<button class="flex h-10 w-10 items-center justify-center rounded-full text-slate-500 hover:bg-slate-200 dark:text-slate-400 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-2xl">more_vert</span>
</button>
</header>
<main class="flex flex-1 flex-col px-4 pb-4">
<div class="mt-4 flex justify-center">
<div class="flex items-center gap-2 rounded-full bg-red-100 px-4 py-1.5 dark:bg-red-900/30">
<span class="h-2 w-2 rounded-full bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.8)]"></span>
<span class="font-mono text-lg font-semibold text-red-600 dark:text-red-400">14:28</span>
</div>
</div>
<div class="flex flex-1 items-center justify-center py-6">
<div class="flex h-32 w-full items-center justify-center gap-1.5 px-8">
<div class="h-4 w-1.5 rounded-full bg-primary/40 dark:bg-primary/50"></div>
<div class="h-8 w-1.5 rounded-full bg-primary/60 dark:bg-primary/70"></div>
<div class="h-16 w-1.5 rounded-full bg-primary/80 dark:bg-primary"></div>
<div class="h-10 w-1.5 rounded-full bg-primary/60 dark:bg-primary/70"></div>
<div class="h-24 w-1.5 rounded-full bg-primary shadow-[0_0_12px_rgba(19,91,236,0.6)]"></div>
<div class="h-14 w-1.5 rounded-full bg-primary/80 dark:bg-primary"></div>
<div class="h-20 w-1.5 rounded-full bg-primary shadow-[0_0_12px_rgba(19,91,236,0.6)]"></div>
<div class="h-12 w-1.5 rounded-full bg-primary/60 dark:bg-primary/70"></div>
<div class="h-28 w-1.5 rounded-full bg-primary shadow-[0_0_15px_rgba(19,91,236,0.8)]"></div>
<div class="h-16 w-1.5 rounded-full bg-primary/80 dark:bg-primary"></div>
<div class="h-8 w-1.5 rounded-full bg-primary/60 dark:bg-primary/70"></div>
<div class="h-12 w-1.5 rounded-full bg-primary/60 dark:bg-primary/70"></div>
<div class="h-6 w-1.5 rounded-full bg-primary/40 dark:bg-primary/50"></div>
</div>
</div>
<div class="mb-6 flex w-full flex-col">
<div class="mb-2 flex items-center gap-2 px-1">
<span class="material-symbols-outlined text-sm text-slate-500 dark:text-slate-400">closed_caption</span>
<span class="text-xs font-medium text-slate-500 dark:text-slate-400">Live Transcript</span>
</div>
<div class="relative w-full rounded-2xl bg-white dark:bg-slate-800/60 p-4 shadow-sm border border-slate-200 dark:border-slate-700/50">
<textarea class="h-28 w-full resize-none border-0 bg-transparent p-0 text-base leading-relaxed text-slate-700 focus:ring-0 dark:text-slate-300 placeholder:text-slate-400 dark:placeholder:text-slate-500" placeholder="Waiting for speech..." readonly="">We need to focus on the Q3 deliverables. The main priority right now is ensuring the new dashboard is ready for the beta users by next Tuesday. Also, let's schedule a follow-up with the marketing team to align on the launch strategy...</textarea>
<div class="absolute bottom-0 left-0 right-0 h-12 rounded-b-2xl bg-gradient-to-t from-white to-transparent dark:from-slate-800/60"></div>
</div>
</div>
<div class="mt-auto w-full">
<button class="group relative flex h-14 w-full items-center justify-center gap-3 overflow-hidden rounded-2xl bg-primary px-6 font-semibold text-white shadow-lg transition-transform active:scale-[0.98]">
<span class="material-symbols-outlined fill-current text-2xl">stop_circle</span>
<span class="text-lg tracking-wide">Stop &amp; Analyze</span>
<div class="absolute inset-0 bg-white/0 transition-colors group-hover:bg-white/10"></div>
</button>
</div>
</main>
<nav class="flex w-full items-end justify-between border-t border-slate-200 bg-background-light px-6 pb-6 pt-3 dark:border-slate-800 dark:bg-background-dark">
<a class="flex flex-col items-center text-slate-400 hover:text-primary dark:text-slate-500 dark:hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-2xl">dashboard</span>
<span class="text-[10px] font-medium mt-1">Dashboard</span>
</a>
<a class="flex flex-col items-center text-slate-400 hover:text-primary dark:text-slate-500 dark:hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-2xl">contacts</span>
<span class="text-[10px] font-medium mt-1">Clients</span>
</a>
<div class="relative -top-5">
<a class="flex h-14 w-14 items-center justify-center rounded-full bg-primary text-white shadow-[0_4px_12px_rgba(19,91,236,0.4)] ring-4 ring-background-light dark:ring-background-dark hover:bg-blue-600 transition-colors" href="#">
<span class="material-symbols-outlined text-3xl">mic</span>
</a>
</div>
<a class="flex flex-col items-center text-slate-400 hover:text-primary dark:text-slate-500 dark:hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-2xl">calendar_month</span>
<span class="text-[10px] font-medium mt-1">Schedule</span>
</a>
<a class="flex flex-col items-center text-slate-400 hover:text-primary dark:text-slate-500 dark:hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-2xl">settings</span>
<span class="text-[10px] font-medium mt-1">Settings</span>
</a>
</nav>
</div>

</body></html>
